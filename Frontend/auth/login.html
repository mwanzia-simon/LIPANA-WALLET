<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMONYX WALLET | LOGIN</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="login-container">
      <img
        class="logo"
        src="/Frontend/assets/wallet.svg"
        alt="SIMONYX WALLET"
      />
      <div class="form-container">
        <h3>LOGIN TO SIMONYX WALLET</h3>
        <form id="login-form">
          <div class="inputs">
            <label for="email">EMAIL</label>
            <input type="email" id="email" placeholder="Eg. youremail@gmail.com" />
          </div>
          <div class="inputs">
            <label for="password">PASSWORD</label>
            <input
              type="password"
              id="password"
              placeholder="Eg. 123456"
            />
          </div>
          <button id="login-button">LOGIN</button>
        </form>
        <a href="./register.html">Don't have an account?.Click to register.</a>
      </div>
      <a href="/Frontend/index.html">Back to home</a>
    </div>

    <script src="./js/auth.js"></script>
  </body>
</html>
